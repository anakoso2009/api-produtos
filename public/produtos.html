<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerenciador de Produtos</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="container-header">
          <nav>
            <ul>
              <li><a href="./index.html">home</a></li>
              <li><a href="./produtos.html">gerenciador de produtos</a></li>
                <li><a href="./sobre.html">sobre nós</a></li>

            </ul>
        </nav>


      </div>


    </header>

    <!-- Conteúdo Principal -->
    <main>
      <div class="container">
        <!-- Seção de Formulário -->
        <section class="form-section">
          <h2>Adicionar ou Editar Produto</h2>
          <form id="clientForm">
            <div class="form-group">
              <label for="nome">Nome:</label>
              <input
                type="text"
                id="nome"
                name="nome"
                placeholder="Digite o nome completo"
                required
              />
            </div>

            <div class="form-group">
              <label for="preco">Preço:</label>
              <input
                type="number"
                id="preco"
                name="preco"
                placeholder="00.00"
                step="0.01"
                required
              />
            </div>

            <div class="form-group">
              <label for="estoque">Estoque:</label>
              <input
                type="number"
                id="estoque"
                name="estoque"
                placeholder="0"
                min="0"
                required
              />
            </div>

            <div class="form-group">
              <label for="categoria">Categoria:</label>
              <input
                type="text"
                id="categoria"
                name="categoria"
                placeholder="Digite a categoria do produto"
                required
              />
            </div>


            <div class="form-buttons">
              <button type="submit" class="btn btn-primary">
                Salvar Produto
              </button>
              <button type="button" class="btn btn-secondary" id="btnLimpar">
                Limpar Formulário
              </button>
            </div>
          </form>
        </section>

        <!-- Seção de Listagem -->
        <section class="list-section">
          <h2>Lista de Produtos</h2>

          <div class="list-controls">
            <button class="btn btn-success" id="btnRecarregar">
              🔄 Recarregar Lista
            </button>
            <div class="search-box">
              <select id="searchType" title="Selecionar tipo de busca">
                <option value="nome">Buscar por Nome</option>
                <option value="id">Buscar por ID</option>
              </select>
              <input
                type="text"
                id="searchInput"
                placeholder="Digite o valor para buscar..."
              />
              <button class="btn btn-primary" id="btnBuscar">Buscar</button>
            </div>
          </div>

          <div
            id="loadingMessage"
            class="message message-info"
          >
            Carregando produtos...
          </div>

          <div id="emptyMessage" class="message message-info">
            Nenhum produto cadastrado. Adicione um novo produto usando o
            formulário acima.
          </div>

          <div id="clientsList" class="clients-table-container">
            <!-- Tabela será preenchida via JavaScript -->
          </div>
        </section>
      </div>
    </main>

    <!-- Rodapé -->
    <footer>
      <p>
        &copy; 2026 - Sistema de Gestão de Produtos | Desenvolvido para Alunos
        de Desenvolvimento de Sistemas
      </p>
    </footer>

    <!-- Modal de Mensagens -->
    <div id="modalMessage" class="modal-message">
      <div class="modal-content">
        <p id="modalText"></p>
        <button class="btn btn-primary" onclick="fecharModal()">Fechar</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
